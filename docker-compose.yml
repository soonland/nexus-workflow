services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nexus_workflow
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
