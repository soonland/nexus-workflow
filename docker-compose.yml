services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nexus_workflow_test
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
