name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─── nexus-workflow-core ────────────────────────────────────────────────────
  core:
    name: nexus-workflow-core
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: nexus-workflow-core

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nexus-workflow-core/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:coverage

      - name: Coverage summary
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: nexus-workflow-core
          vite-config-path: nexus-workflow-core/vitest.config.ts
          json-summary-path: nexus-workflow-core/coverage/coverage-summary.json
          json-final-path: nexus-workflow-core/coverage/coverage-final.json

  # ─── nexus-workflow-app ─────────────────────────────────────────────────────
  app:
    name: nexus-workflow-app
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: nexus-workflow-app

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus_workflow_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            nexus-workflow-core/package-lock.json
            nexus-workflow-app/package-lock.json

      - name: Install core dependencies
        run: npm ci
        working-directory: nexus-workflow-core

      - name: Build core
        run: npm run build
        working-directory: nexus-workflow-core

      - name: Install app dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:coverage
        env:
          DATABASE_URL: postgres://nexus:nexus@localhost:5433/nexus_workflow_test

      - name: Coverage summary
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: nexus-workflow-app
          vite-config-path: nexus-workflow-app/vitest.config.ts
          json-summary-path: nexus-workflow-app/coverage/coverage-summary.json
          json-final-path: nexus-workflow-app/coverage/coverage-final.json

  # ─── nexus-erp ──────────────────────────────────────────────────────────────
  erp:
    name: nexus-erp
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: nexus-erp

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nexus-erp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:coverage

      - name: Coverage summary
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: nexus-erp
          vite-config-path: nexus-erp/vitest.config.ts
          json-summary-path: nexus-erp/coverage/coverage-summary.json
          json-final-path: nexus-erp/coverage/coverage-final.json
