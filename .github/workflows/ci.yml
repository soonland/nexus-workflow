name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─── nexus-workflow-core ────────────────────────────────────────────────────
  core:
    name: nexus-workflow-core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-workflow-core

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nexus-workflow-core/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # ─── nexus-workflow-app ─────────────────────────────────────────────────────
  app:
    name: nexus-workflow-app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-workflow-app

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus_workflow_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            nexus-workflow-core/package-lock.json
            nexus-workflow-app/package-lock.json

      - name: Install core dependencies
        run: npm ci
        working-directory: nexus-workflow-core

      - name: Build core
        run: npm run build
        working-directory: nexus-workflow-core

      - name: Install app dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          DATABASE_URL: postgres://nexus:nexus@localhost:5433/nexus_workflow_test

  # ─── nexus-erp ──────────────────────────────────────────────────────────────
  erp:
    name: nexus-erp
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexus-erp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nexus-erp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npx next lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
