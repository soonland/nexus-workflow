name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only allow the repo owner to invoke @claude.
    if: |
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.review.author_association == 'OWNER' ||
        github.event.issue.author_association == 'OWNER'
      ) && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # When triggered from an issue, produce a structured implementation plan
          # following the template in .github/ISSUE_TEMPLATE/implementation-plan.md.
          # When triggered from a PR comment or review, act on the comment directly.
          prompt: |
            If triggered from an issue:
            - Read the issue body carefully.
            - Explore the codebase to understand the relevant files and existing patterns.
            - Post a comment on the issue containing a structured implementation plan using this format:

            ## Parent Issue
            Part of #<issue number> — <issue title>

            ## Scope
            <one or two sentences describing what needs to change and which package(s) are affected>

            ## Tasks
            - [ ] <specific file path or component to create/modify>
            - [ ] <next task>
            - [ ] Tests + typecheck pass

            ## Dependencies
            <other issues that must be merged first, or "None">

            ## Blocks
            <issues that cannot start until this is merged, or "None">

            ## Known Limitations
            <edge cases, deferred work, or constraints worth flagging>

            Do NOT write or commit any code. Post the plan as a comment only.

            If triggered from a PR comment or review, perform the action described in the comment.

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr:*)'

